services:
  - type: web
    name: ai-fund-api
    runtime: docker
    rootDir: Ai_Fund
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
  - type: web
    runtime: static
    name: fundai-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
